<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <style>
        body { background-color: #000c18; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #001f3f, #000c18); }
        h1 { color: #FFD700; text-shadow: 0 0 10px #FFD700; }
        .btn { background: #ff4d4d; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; cursor: pointer; border: none; font-size: 1.1rem; }
        #surprise { display: none; padding: 50px; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://img.freepik.com/free-vector/cute-couple-love-concept-illustration_114360-1014.jpg" style="width:200px; border-radius:50%;">
        <h1>Happy Birthday, My Queen! ❤️</h1>
        <p>Aaj 11 April hai... Kya tum apna surprise dekhna chahti ho?</p>
        <button class="btn" onclick="document.getElementById('surprise').style.display='block'; window.scrollTo(0,document.body.scrollHeight);">HAAN, DEKHNA HAI!</button>
    </div>
    <div id="surprise">
        <h2 style="color: #FFD700;">I LOVE YOU FOREVER! 💍</h2>
        <p>"Tum meri zindagi ka sabse haseen tohfa ho. Happy Birthday!"</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ6bmZ4ZzB6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Jm09Zz/MDJ9uH57Y099S/giphy.gif" width="150">
    </div>
</body>
</html>
